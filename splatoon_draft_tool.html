.section{

    margin-bottom:20px;
    border-radius:10px;
}

select{
    padding:5px;
    margin:3px;
}

.playerBox{ margin-bottom:8px; }

.weaponCard{
    width:120px;          /* ← 180 → 120に縮小 */
    border:1px solid #ccc;
    border-radius:8px;

    font-size:12px;       /* ← 文字も少し小さく */

    width:90px;           /* ← 120 → 90 */
    height:90px;
    object-fit:contain;
}

.actions button{
    margin:1px;
    padding:2px 4px;      /* ← ボタン小さく */
    font-size:11px;
}

.weaponCard.ban{ background:#ff0000; }
.weaponCard.teamA{ background:#1E90FF; }
.weaponCard.teamB{ background:#FFA500; }


.summaryItem{ margin-bottom:4px; }

.grid{
    display:flex;
    flex-wrap:wrap;
}

let playerWeapons = Array(8).fill(null).map(()=>Array(3).fill(""));

let allWeapons = [];
let weaponState = {};

function renderInputs(){

const hostDiv = document.getElementById("hostInputs");
hostDiv.innerHTML="";

for(let i=0;i<4;i++){

let html = `<select onchange="hostWeapons[${i}]=this.value"><option value="">選択</option>`;

WEAPON_POOL.forEach(w=>{
html += `<option value="${w}">${w}</option>`;
});

html += "</select>";
hostDiv.innerHTML += html;

}

const playerDiv = document.getElementById("playerInputs");
playerDiv.innerHTML="";

for(let i=0;i<8;i++){
playerDiv.innerHTML += `<div class="playerBox">参加者${i+1}<br>`;

for(let j=0;j<3;j++){

let html = `<select onchange="playerWeapons[${i}][${j}]=this.value"><option value="">武器</option>`;

WEAPON_POOL.forEach(w=>{
html += `<option value="${w}">${w}</option>`;
});

html += "</select>";
playerDiv.innerHTML += html;

}

playerDiv.innerHTML += "</div>";
}

}

function startDraft(){

allWeapons = [];

hostWeapons.forEach(w=>{ if(w && !allWeapons.includes(w)) allWeapons.push(w); });
playerWeapons.forEach(p=>p.forEach(w=>{ if(w && !allWeapons.includes(w)) allWeapons.push(w); }));

document.getElementById("registerSection").style.display="none";
document.getElementById("draftSection").style.display="block";

renderDraft();

}

function setState(w,s){
weaponState[w] = weaponState[w] === s ? "" : s;
renderDraft();
}

function renderDraft(){

const grid = document.getElementById("weaponGrid");
grid.innerHTML="";

allWeapons.forEach(w=>{

const card = document.createElement("div");
card.className="weaponCard";

if(weaponState[w]==="ban") card.classList.add("ban");
if(weaponState[w]==="A") card.classList.add("teamA");
if(weaponState[w]==="B") card.classList.add("teamB");

card.innerHTML=`
<img src="${WEAPON_IMAGES[w]||''}">
<div><b>${w}</b></div>
<div class="actions">
<button onclick="setState('${w}','ban')">🚫</button>
<button onclick="setState('${w}','A')">A</button>
<button onclick="setState('${w}','B')">B</button>
</div>
`;

grid.appendChild(card);

});

updateSummary();

}

function updateSummary(){

let ban=[],a=[],b=[];

Object.keys(weaponState).forEach(w=>{
if(weaponState[w]==="ban") ban.push(w);
if(weaponState[w]==="A") a.push(w);
if(weaponState[w]==="B") b.push(w);
});

document.getElementById("banList").innerHTML = ban.map(x=>`<div class="summaryItem">${x}</div>`).join("");
document.getElementById("teamAList").innerHTML = a.map(x=>`<div class="summaryItem">${x}</div>`).join("");
document.getElementById("teamBList").innerHTML = b.map(x=>`<div class="summaryItem">${x}</div>`).join("");

}

renderInputs();

</script>

</body>
</html>
